services:
  - type: web
    name: pietro-emilly
    env: static
    buildCommand: echo "Static site ready"
    staticPublishPath: .
    headers:
      # HTML e SW: nunca cachear (sempre busca versão fresca)
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /sw.js
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      # Manifest: cache curto (precisa ser re-lido para PWA install)
      - path: /manifest.json
        name: Cache-Control
        value: public, max-age=86400
      # CSS: cache curto com revalidação — muda pouco entre deploys
      - path: /css/*
        name: Cache-Control
        value: public, max-age=3600, stale-while-revalidate=86400
      # JS: nunca cachear no CDN — o SW cuida do cache offline.
      # max-age=0 garante que cada deploy serve o JS novo imediatamente,
      # sem precisar esperar a expiração do cache do Render/browser.
      - path: /js/*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      # Assets e emojis: cache longo (imagens imutáveis)
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /emojis/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
