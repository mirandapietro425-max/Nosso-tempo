services:
  - type: web
    name: pietro-emilly
    env: static
    buildCommand: echo "Static site ready"
    staticPublishPath: .
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /css/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /js/*
        name: Cache-Control
        value: public, max-age=3600
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /sw.js
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /sw.js
        name: Service-Worker-Allowed
        value: /
